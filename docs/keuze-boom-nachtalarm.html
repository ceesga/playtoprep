<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keuze-boom — Nachtalarm · PlayToPrep</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0b1520;
  color: #dde4ed;
  padding: 40px 24px 80px;
  min-height: 100vh;
}

.page-header {
  text-align: center;
  margin-bottom: 32px;
}
.page-header h1 {
  font-size: 1.4rem;
  color: #7ab8e8;
  font-weight: 700;
  letter-spacing: 0.02em;
  margin-bottom: 6px;
}
.page-header p {
  font-size: 0.82rem;
  color: #5a7080;
}

.legend {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 44px;
  font-size: 0.76rem;
  color: #7a8a98;
}
.legend-item { display: flex; align-items: center; gap: 8px; }
.legend-box {
  width: 32px;
  height: 15px;
  border-radius: 3px;
  flex-shrink: 0;
}
.lb-scene     { background: #162e4a; border: 1.5px solid #4a8abf; }
.lb-keuze     { background: #102a12; border: 1.5px solid #3a7a3a; }
.lb-cond      { background: #2e1a00; border: 1.5px solid #a06020; }
.lb-condscene { background: #2e1000; border: 1.5px solid #b03808; }

#scroll-wrap {
  overflow-x: auto;
  overflow-y: visible;
}

#tree {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: max-content;
  padding: 0 60px 20px;
}

#svg-layer {
  position: absolute;
  top: 0; left: 0;
  pointer-events: none;
  z-index: 0;
  overflow: visible;
}

/* ── Scene level ─────────────────────────────────── */
.level {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  position: relative;
  z-index: 1;
}
.level:first-child { padding-top: 0; }
.level:not(:first-child) { padding-top: 50px; }

.scene-node {
  background: #162e4a;
  border: 2px solid #4a8abf;
  border-radius: 10px;
  padding: 12px 24px;
  text-align: center;
  min-width: 210px;
  max-width: 310px;
  box-shadow: 0 3px 14px rgba(0,0,0,0.45);
}
.scene-node.cond-scene {
  background: #2c1000;
  border-color: #b03808;
}

.scene-id {
  font-family: 'Courier New', monospace;
  font-size: 0.66rem;
  color: #4a8abf;
  letter-spacing: 0.06em;
  margin-bottom: 3px;
}
.cond-scene .scene-id { color: #b03808; }

.scene-time {
  font-size: 0.68rem;
  color: #4a6070;
  margin-bottom: 4px;
}

.scene-title {
  font-size: 0.92rem;
  font-weight: 600;
  color: #e0e8f0;
  line-height: 1.3;
}

.scene-condnote {
  margin-top: 6px;
  font-size: 0.67rem;
  color: #b03808;
  font-style: italic;
  line-height: 1.4;
}

.scene-auto {
  margin-top: 5px;
  font-size: 0.67rem;
  color: #3a5a6a;
  font-style: italic;
}

/* ── Choice row ──────────────────────────────────── */
.choice-row {
  display: flex;
  flex-wrap: nowrap;
  gap: 10px;
  justify-content: center;
  align-items: flex-start;
  padding-top: 50px;
  position: relative;
  z-index: 1;
}

.choice-card {
  background: #102a12;
  border: 1.5px solid #3a7a3a;
  border-radius: 8px;
  padding: 9px 11px;
  width: 152px;
  flex-shrink: 0;
  font-size: 0.74rem;
  line-height: 1.45;
  text-align: center;
  color: #90c090;
  box-shadow: 0 2px 8px rgba(0,0,0,0.35);
}
.choice-card.cond {
  background: #2c1800;
  border-color: #a06020;
  color: #c09860;
}

.cond-tag {
  display: block;
  margin-top: 7px;
  padding-top: 6px;
  border-top: 1px solid #3a2a10;
  font-size: 0.62rem;
  color: #906030;
  font-style: italic;
  line-height: 1.35;
}

/* ── Rapport ─────────────────────────────────────── */
.rapport-level {
  padding-top: 50px;
  position: relative;
  z-index: 1;
}
.rapport-node {
  background: #1e1030;
  border: 2px solid #6030a8;
  border-radius: 10px;
  padding: 13px 42px;
  font-size: 1rem;
  font-weight: 700;
  color: #a880d8;
  letter-spacing: 0.03em;
  box-shadow: 0 3px 14px rgba(0,0,0,0.45);
}
</style>
</head>
<body>

<div class="page-header">
  <h1>Keuze-boom — Nachtalarm</h1>
  <p>De rookmelder gaat af in de nacht &nbsp;·&nbsp; Maandag 22:30 → Dinsdag 02:45 &nbsp;·&nbsp; PlayToPrep</p>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-box lb-scene"></div>Scene</div>
  <div class="legend-item"><div class="legend-box lb-keuze"></div>Keuze — altijd zichtbaar</div>
  <div class="legend-item"><div class="legend-box lb-cond"></div>Keuze — conditioneel (profiel)</div>
  <div class="legend-item"><div class="legend-box lb-condscene"></div>Scène — conditioneel (kan worden overgeslagen)</div>
</div>

<div id="scroll-wrap">
  <div id="tree">
    <svg id="svg-layer"></svg>
  </div>
</div>

<script>
const SCENES = [
  {
    id: 'na_intro', time: 'Maandag · 22:30', title: 'Naar bed gaan',
    choices: [
      { text: '😴 Ga slapen' }
    ]
  },
  {
    id: 'na_alarm', time: 'Dinsdag · 02:17', title: 'Alarm in het donker',
    auto: 'Tussenscène — auto-doorgaan, geen keuze'
  },
  {
    id: 'na_0', time: '02:17', title: 'Wakker schrikken',
    choices: [
      { text: '⚡ Meteen opstaan en luisteren' },
      { text: '🗣️ Huisgenoten direct wakker maken', cond: 'Huisgenoten aanwezig + nog niet gewaarschuwd' },
      { text: '🛌 Blijven liggen — vast loos alarm' }
    ]
  },
  {
    id: 'na_1', time: '02:18', title: 'Deur open — rook in de hal',
    choices: [
      { text: '🗣️ Direct iedereen wakker maken', cond: 'Huisgenoten aanwezig + nog niet gewaarschuwd' },
      { text: '📱 Meteen 112 bellen' },
      { text: '🔍 Zelf gaan kijken wat er aan de hand is' }
    ]
  },
  {
    id: 'na_2', time: '02:19', title: 'Rook in de woonkamer',
    choices: [
      { text: '💧 Pan water over het stopcontact gooien' },
      { text: '🔍 Dichterbij gaan kijken' },
      { text: '🚪 Teruglopen, iedereen naar buiten sturen', cond: 'Huisgenoten aanwezig + nog niet gewaarschuwd' },
      { text: '🚪 Woonkamerdeur dichtdoen en naar buiten gaan' }
    ]
  },
  {
    id: 'na_2b', time: '02:20', title: 'Huisgenoten komen de gang op',
    conditional: true,
    condNote: 'Overgeslagen als: geen huisgenoten, of al gewaarschuwd',
    choices: [
      { text: '🚪 Iedereen direct naar buiten sturen' },
      { text: '🐾 Huisdier roepen en meenemen', cond: 'Heeft huisdier' }
    ]
  },
  {
    id: 'na_3', time: '02:20', title: 'Rook wordt dikker — op de drempel',
    choices: [
      { text: '📁 Documenten / medicijnen grijpen bij de deur', cond: 'Heeft docs/medicijnen + geen vluchttas' },
      { text: '🎒 Vluchttas pakken en naar buiten rennen', cond: 'Heeft vluchttas' },
      { text: '⚡ Stroom uitschakelen bij de meterkast' },
      { text: '🚪 Meteen naar buiten gaan' },
      { text: '🔑 Sleutels en telefoon zoeken' },
      { text: '🧒 / 🦽 Kwetsbare personen helpen', cond: 'Huisgenoten / kinderen / bewegingsbeperking' }
    ]
  },
  {
    id: 'na_4', time: '02:22', title: 'Buiten — wachten op brandweer',
    choices: [
      { text: '📱 112 bellen', cond: '112 nog niet gebeld' },
      { text: '👥 Controleren of iedereen buiten is', cond: 'Huisgenoten aanwezig' },
      { text: '🏘️ Buren waarschuwen dat er brand is' },
      { text: '⏳ Buiten wachten op de brandweer' }
    ]
  },
  {
    id: 'na_5', time: '02:45', title: 'Brandweer heeft controle',
    choices: [
      { text: '✅ Alles bij je — slaapplek regelen' },
      { text: '🏠 Vragen of je nog kort naar binnen mag voor papieren' }
    ]
  }
];

// ── Build DOM ──────────────────────────────────────────────────
function buildTree() {
  const tree = document.getElementById('tree');

  SCENES.forEach(scene => {
    const level = document.createElement('div');
    level.className = 'level';
    level.dataset.id = scene.id;

    // Scene node
    const node = document.createElement('div');
    node.className = 'scene-node' + (scene.conditional ? ' cond-scene' : '');
    node.dataset.role = 'scene';
    node.innerHTML =
      `<div class="scene-id">${scene.id}</div>` +
      `<div class="scene-time">${scene.time}</div>` +
      `<div class="scene-title">${scene.title}</div>` +
      (scene.condNote ? `<div class="scene-condnote">⚠️ ${scene.condNote}</div>` : '') +
      (scene.auto    ? `<div class="scene-auto">${scene.auto}</div>` : '');
    level.appendChild(node);

    // Choice row
    if (scene.choices && scene.choices.length) {
      const row = document.createElement('div');
      row.className = 'choice-row';
      row.dataset.role = 'choices';
      scene.choices.forEach(c => {
        const card = document.createElement('div');
        card.className = 'choice-card' + (c.cond ? ' cond' : '');
        card.innerHTML = c.text + (c.cond ? `<span class="cond-tag">⚠️ ${c.cond}</span>` : '');
        row.appendChild(card);
      });
      level.appendChild(row);
    }

    tree.appendChild(level);
  });

  // Rapport
  const rapDiv = document.createElement('div');
  rapDiv.className = 'rapport-level';
  rapDiv.dataset.role = 'rapport';
  rapDiv.innerHTML = '<div class="rapport-node">📋 RAPPORT</div>';
  tree.appendChild(rapDiv);
}

// ── Draw SVG connections ───────────────────────────────────────
function drawLines() {
  const svg    = document.getElementById('svg-layer');
  const tree   = document.getElementById('tree');
  const tRect  = tree.getBoundingClientRect();

  svg.style.width  = tree.scrollWidth  + 'px';
  svg.style.height = tree.scrollHeight + 'px';
  svg.setAttribute('width',  tree.scrollWidth);
  svg.setAttribute('height', tree.scrollHeight);
  svg.innerHTML = '';

  // Translate viewport rect → tree-relative coords
  function rel(el) {
    const r = el.getBoundingClientRect();
    const x = r.left - tRect.left + window.scrollX - (tree.getBoundingClientRect().left - tRect.left);
    const y = r.top  - tRect.top  + window.scrollY - (tree.getBoundingClientRect().top  - tRect.top);
    return {
      x, y, w: r.width, h: r.height,
      tcx: x + r.width / 2,          // top center x
      tcy: y,                          // top center y
      bcx: x + r.width / 2,           // bottom center x
      bcy: y + r.height                // bottom center y
    };
  }

  // Recompute using page-relative math for correctness
  function pos(el) {
    let left = 0, top = 0;
    let e = el;
    while (e && e !== tree) {
      left += e.offsetLeft;
      top  += e.offsetTop;
      e = e.offsetParent;
    }
    return {
      tcx: left + el.offsetWidth / 2,
      tcy: top,
      bcx: left + el.offsetWidth / 2,
      bcy: top + el.offsetHeight,
      w: el.offsetWidth,
      h: el.offsetHeight
    };
  }

  function bezier(x1, y1, x2, y2, col, w, op) {
    const dy = Math.abs(y2 - y1);
    const cp = dy * 0.55;
    const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    p.setAttribute('d', `M ${x1} ${y1} C ${x1} ${y1+cp}, ${x2} ${y2-cp}, ${x2} ${y2}`);
    p.setAttribute('stroke', col);
    p.setAttribute('stroke-width', w || 1.5);
    p.setAttribute('fill', 'none');
    p.setAttribute('opacity', op || 1);
    return p;
  }

  function dot(cx, cy, r, fill) {
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', cx);
    c.setAttribute('cy', cy);
    c.setAttribute('r',  r);
    c.setAttribute('fill', fill);
    return c;
  }

  // Collect all anchor elements in order
  const levels  = [...tree.querySelectorAll('.level')];
  const rapport = tree.querySelector('.rapport-level .rapport-node');

  // For each level, connect scene → choices, choices → next scene/rapport
  levels.forEach((level, i) => {
    const sceneEl  = level.querySelector('.scene-node');
    const choiceEls = [...(level.querySelectorAll('.choice-card') || [])];
    const isCondScene = sceneEl.classList.contains('cond-scene');
    const sceneLineColor = isCondScene ? '#b03808' : '#3a6e9e';

    const sp = pos(sceneEl);

    // Dot at bottom of scene
    svg.appendChild(dot(sp.bcx, sp.bcy, 3.5, sceneLineColor));

    if (choiceEls.length === 0) {
      // No choices: draw spine directly to next anchor
      const nextAnchor = nextTopAnchor(i, levels, rapport);
      if (nextAnchor) {
        svg.appendChild(bezier(sp.bcx, sp.bcy, nextAnchor.x, nextAnchor.y, sceneLineColor, 1.5, 0.5));
      }
      return;
    }

    // Scene → each choice
    choiceEls.forEach(card => {
      const isCond = card.classList.contains('cond');
      const lineCol = isCond ? '#8a5018' : '#2a6a3a';
      const cp = pos(card);
      svg.appendChild(bezier(sp.bcx, sp.bcy, cp.tcx, cp.tcy, lineCol, 1.5, 0.85));
      svg.appendChild(dot(cp.tcx, cp.tcy, 2.5, isCond ? '#a06020' : '#3a7a3a'));
    });

    // Each choice → next anchor (converge)
    const nextAnchor = nextTopAnchor(i, levels, rapport);
    if (nextAnchor) {
      svg.appendChild(dot(nextAnchor.x, nextAnchor.y, 3.5,
        nextAnchor.isRapport ? '#6030a8' : (nextAnchor.isCond ? '#b03808' : '#3a6e9e')));

      choiceEls.forEach(card => {
        const cp = pos(card);
        svg.appendChild(bezier(cp.bcx, cp.bcy, nextAnchor.x, nextAnchor.y, '#2a4a6a', 1.5, 0.5));
      });
    }
  });
}

function nextTopAnchor(currentIdx, levels, rapport) {
  if (currentIdx < levels.length - 1) {
    const nextScene = levels[currentIdx + 1].querySelector('.scene-node');
    const isCondScene = nextScene.classList.contains('cond-scene');
    const p = posEl(nextScene);
    return { x: p.tcx, y: p.tcy, isCond: isCondScene };
  }
  if (rapport) {
    const p = posEl(rapport);
    return { x: p.tcx, y: p.tcy, isRapport: true };
  }
  return null;
}

function posEl(el) {
  const tree = document.getElementById('tree');
  let left = 0, top = 0;
  let e = el;
  while (e && e !== tree) {
    left += e.offsetLeft;
    top  += e.offsetTop;
    e = e.offsetParent;
  }
  return {
    tcx: left + el.offsetWidth / 2,
    tcy: top,
    bcx: left + el.offsetWidth / 2,
    bcy: top + el.offsetHeight
  };
}

// Override pos() to use offsetParent traversal
function pos(el) { return posEl(el); }

buildTree();
// Draw after two animation frames to ensure layout is settled
requestAnimationFrame(() => requestAnimationFrame(drawLines));
window.addEventListener('resize', drawLines);
</script>
</body>
</html>
