<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Titelontwerp — Goed Voorbereid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Oswald:wght@600;700&family=Barlow+Condensed:wght@700;800;900&family=Roboto+Condensed:wght@700;800&family=Anton&family=Bebas+Neue&family=DM+Sans:wght@700;800&family=Inter:wght@500;600;700;800&family=Poppins:wght@700;800&family=Raleway:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e0e;
      color: #fff;
      padding: 40px 20px 80px;
      font-family: system-ui, sans-serif;
    }

    header {
      font-size: 11px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: .14em;
      margin-bottom: 8px;
    }
    header span {
      color: #333;
    }

    .desc {
      font-size: 12px;
      color: #444;
      margin-bottom: 40px;
    }

    h2.section {
      font-size: 10px;
      font-weight: 600;
      color: #3a3a3a;
      text-transform: uppercase;
      letter-spacing: .18em;
      margin: 56px 0 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #1e1e1e;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 3px;
    }

    .tile {
      padding: 32px 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      cursor: pointer;
      transition: filter .15s;
      position: relative;
    }
    .tile:hover { filter: brightness(1.1); }

    .tile-meta {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .tile-label {
      font-size: 10px;
      color: rgba(255,255,255,.22);
      text-transform: uppercase;
      letter-spacing: .1em;
    }
    .tile-note {
      font-size: 11px;
      color: rgba(255,255,255,.18);
    }

    .title-block {
      line-height: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .nr {
      position: absolute;
      top: 10px;
      right: 14px;
      font-size: 10px;
      color: #2a2a2a;
    }
  </style>
</head>
<body>

  <header>Titelontwerp <span>·</span> twee regels <span>·</span> twee kleuren <span>·</span> hoofdletters</header>
  <p class="desc">Klik op een variant om de font-naam te kopiëren.</p>

  <h2 class="section">A — Lettertype (zelfde opmaak, andere fonts)</h2>
  <div class="grid" id="g-fonts"></div>

  <h2 class="section">B — Kleurcombo's (Montserrat 900)</h2>
  <div class="grid" id="g-colors"></div>

  <h2 class="section">C — Grootteverhouding (Montserrat 900, wit + amber)</h2>
  <div class="grid" id="g-sizes"></div>

  <h2 class="section">D — Letter-spacing variaties</h2>
  <div class="grid" id="g-spacing"></div>

  <h2 class="section">E — Accenten &amp; scheidingen</h2>
  <div class="grid" id="g-accents"></div>

  <script>
    let tileCount = 0;

    function tile({ bg = '#161616', label, note, html, onClick }) {
      tileCount++;
      const nr = tileCount;
      const el = document.createElement('div');
      el.className = 'tile';
      el.style.background = bg;
      el.innerHTML = `
        <span class="nr">${nr}</span>
        <div class="title-block">${html}</div>
        <div class="tile-meta">
          <div class="tile-label">${label}</div>
          ${note ? `<div class="tile-note">${note}</div>` : ''}
        </div>`;
      if (onClick) el.addEventListener('click', onClick);
      return el;
    }

    function line(text, { font, weight = 900, size, color, ls = '0.04em', lh = '0.95' } = {}) {
      return `<span style="display:block;font-family:'${font}',sans-serif;font-weight:${weight};font-size:${size};color:${color};letter-spacing:${ls};line-height:${lh};text-transform:uppercase">${text}</span>`;
    }

    // ── A: Lettertypen ────────────────────────────────────────────────────
    const fontList = [
      { name: 'Montserrat',       w: 900,  s1: '3.6rem', s2: '3.6rem', ls: '.04em' },
      { name: 'Montserrat',       w: 800,  s1: '3.6rem', s2: '3.6rem', ls: '.04em' },
      { name: 'Montserrat',       w: 700,  s1: '3.6rem', s2: '3.6rem', ls: '.04em' },
      { name: 'Oswald',           w: 700,  s1: '4rem',   s2: '4rem',   ls: '.06em' },
      { name: 'Oswald',           w: 600,  s1: '4rem',   s2: '4rem',   ls: '.06em' },
      { name: 'Barlow Condensed', w: 900,  s1: '4rem',   s2: '4rem',   ls: '.03em' },
      { name: 'Barlow Condensed', w: 800,  s1: '4rem',   s2: '4rem',   ls: '.03em' },
      { name: 'Roboto Condensed', w: 800,  s1: '3.8rem', s2: '3.8rem', ls: '.04em' },
      { name: 'Anton',            w: 400,  s1: '4.2rem', s2: '4.2rem', ls: '.03em' },
      { name: 'Bebas Neue',       w: 400,  s1: '4.4rem', s2: '4.4rem', ls: '.06em' },
      { name: 'DM Sans',          w: 800,  s1: '3.2rem', s2: '3.2rem', ls: '.04em' },
      { name: 'Inter',            w: 800,  s1: '3.2rem', s2: '3.2rem', ls: '.04em' },
      { name: 'Inter',            w: 700,  s1: '3.2rem', s2: '3.2rem', ls: '.04em', current: true },
      { name: 'Inter',            w: 600,  s1: '3.2rem', s2: '3.2rem', ls: '.04em' },
      { name: 'Inter',            w: 500,  s1: '3.2rem', s2: '3.2rem', ls: '.04em' },
      { name: 'Poppins',          w: 800,  s1: '3.2rem', s2: '3.2rem', ls: '.04em' },
      { name: 'Raleway',          w: 800,  s1: '3.2rem', s2: '3.2rem', ls: '.06em' },
    ];

    const gA = document.getElementById('g-fonts');
    fontList.forEach(f => {
      gA.appendChild(tile({
        bg: '#0d1b2a',
        label: `${f.name} ${f.w}` + (f.current ? ' — gekozen' : ''),
        note: `${f.s1} · ls ${f.ls}`,
        html:
          line('GOED',       { font: f.name, weight: f.w, size: f.s1, color: '#ffffff', ls: f.ls }) +
          line('VOORBEREID', { font: f.name, weight: f.w, size: f.s2, color: '#06b6d4', ls: f.ls }),
        onClick: () => navigator.clipboard?.writeText(f.name)
      }));
    });

    // ── B: Kleurcombo's ───────────────────────────────────────────────────
    const combos = [
      { c1: '#ffffff', c2: '#f59e0b', label: 'Wit + amber',        bg: '#161616' },
      { c1: '#ffffff', c2: '#f97316', label: 'Wit + oranje',       bg: '#161616' },
      { c1: '#ffffff', c2: '#ef4444', label: 'Wit + rood',         bg: '#161616' },
      { c1: '#ffffff', c2: '#06b6d4', label: 'Wit + cyaan',        bg: '#161616' },
      { c1: '#ffffff', c2: '#3b82f6', label: 'Wit + blauw',        bg: '#161616' },
      { c1: '#ffffff', c2: '#22c55e', label: 'Wit + groen',        bg: '#161616' },
      { c1: '#f59e0b', c2: '#ffffff', label: 'Amber + wit',        bg: '#161616' },
      { c1: '#f97316', c2: '#ffffff', label: 'Oranje + wit',       bg: '#161616' },
      { c1: '#ef4444', c2: '#ffffff', label: 'Rood + wit',         bg: '#161616' },
      { c1: '#06b6d4', c2: '#ffffff', label: 'Cyaan + wit',        bg: '#161616' },
      { c1: '#f59e0b', c2: '#f97316', label: 'Amber + oranje',     bg: '#161616' },
      { c1: '#fff',    c2: '#f59e0b', label: 'Wit + amber · donkerblauw', bg: '#0d1b2a' },
      { c1: '#fff',    c2: '#f97316', label: 'Wit + oranje · donkerblauw', bg: '#0d1b2a' },
      { c1: '#fff',    c2: '#06b6d4', label: 'Wit + cyaan · donkerblauw', bg: '#0d1b2a', current: true },
      { c1: '#fff',    c2: '#f59e0b', label: 'Wit + amber · leisteen', bg: '#0f1318' },
      { c1: '#fff',    c2: '#f97316', label: 'Wit + oranje · brand', bg: '#1c0a00' },
    ];

    const gB = document.getElementById('g-colors');
    combos.forEach(c => {
      gB.appendChild(tile({
        bg: c.bg,
        label: c.label + (c.current ? ' — gekozen' : ''),
        html:
          line('GOED',       { font: 'Inter', weight: 700, size: '3.2rem', color: c.c1 }) +
          line('VOORBEREID', { font: 'Inter', weight: 700, size: '3.2rem', color: c.c2 }),
      }));
    });

    // ── C: Grootteverhouding ──────────────────────────────────────────────
    const ratios = [
      { s1: '5rem',   s2: '5rem',   note: 'gelijk groot (5rem)' },
      { s1: '4rem',   s2: '4rem',   note: 'gelijk groot (4rem)' },
      { s1: '3rem',   s2: '3rem',   note: 'gelijk groot (3rem)' },
      { s1: '5rem',   s2: '3.2rem', note: 'GOED groter' },
      { s1: '3.2rem', s2: '5rem',   note: 'VOORBEREID groter' },
      { s1: '6rem',   s2: '3.6rem', note: 'GOED dominant' },
      { s1: '3rem',   s2: '5.5rem', note: 'VOORBEREID dominant' },
      { s1: '4rem',   s2: '4rem',   note: 'gelijk · ls ruimer',  ls: '.12em' },
      { s1: '4rem',   s2: '4rem',   note: 'gelijk · ls smal',    ls: '.01em' },
      { s1: '2rem',   s2: '5rem',   note: '"goed" als prefix',   w1: 700 },
    ];

    const gC = document.getElementById('g-sizes');
    ratios.forEach(r => {
      const ls = r.ls || '.04em';
      gC.appendChild(tile({
        bg: '#0d1b2a',
        label: `${r.s1} / ${r.s2}`,
        note: r.note,
        html:
          line('GOED',       { font: 'Inter', weight: r.w1 || 700, size: r.s1, color: '#ffffff', ls }) +
          line('VOORBEREID', { font: 'Inter', weight: 700,          size: r.s2, color: '#06b6d4', ls }),
      }));
    });

    // ── D: Letter-spacing ─────────────────────────────────────────────────
    const spacings = [
      { ls: '-.02em', note: 'negatief (-.02em) · strak, modern' },
      { ls: '0',      note: 'geen (0) · dicht op elkaar' },
      { ls: '.02em',  note: 'minimaal (.02em)' },
      { ls: '.04em',  note: 'subtiel (.04em)' },
      { ls: '.08em',  note: 'gematigd (.08em)' },
      { ls: '.12em',  note: 'ruim (.12em)' },
      { ls: '.18em',  note: 'breed (.18em)' },
      { ls: '.26em',  note: 'heel breed (.26em)' },
      { ls1: '.02em', ls2: '.12em', note: 'GOED smal · VOORBEREID ruim' },
      { ls1: '.14em', ls2: '0',     note: 'GOED ruim · VOORBEREID smal' },
    ];

    const gD = document.getElementById('g-spacing');
    spacings.forEach(s => {
      const ls1 = s.ls1 || s.ls || '.04em';
      const ls2 = s.ls2 || s.ls || '.04em';
      gD.appendChild(tile({
        bg: '#0d1b2a',
        label: s.ls ? `ls ${s.ls}` : `ls ${s.ls1} / ${s.ls2}`,
        note: s.note,
        html:
          line('GOED',       { font: 'Inter', weight: 700, size: '3.2rem', color: '#ffffff', ls: ls1 }) +
          line('VOORBEREID', { font: 'Inter', weight: 700, size: '3.2rem', color: '#06b6d4', ls: ls2 }),
      }));
    });

    // ── E: Accenten & scheidingen ─────────────────────────────────────────
    const accents = [
      {
        label: 'Streep tussen regels',
        note: '2px lijn als scheiding',
        html: `
          ${line('GOED', { font: 'Inter', weight: 700, size: '4rem', color: '#fff', ls: '.04em' })}
          <span style="display:block;width:100%;height:2px;background:#06b6d4;margin:6px 0"></span>
          ${line('VOORBEREID', { font: 'Inter', weight: 700, size: '4rem', color: '#06b6d4', ls: '.04em' })}
        `
      },
      {
        label: 'Dunne streep boven GOED',
        note: 'accent boven eerste regel',
        html: `
          <span style="display:block;width:48px;height:3px;background:#06b6d4;margin-bottom:10px"></span>
          ${line('GOED', { font: 'Inter', weight: 700, size: '4rem', color: '#fff', ls: '.04em' })}
          ${line('VOORBEREID', { font: 'Inter', weight: 700, size: '4rem', color: '#06b6d4', ls: '.04em' })}
        `
      },
      {
        label: 'Punt-accent voor GOED',
        note: 'kleine markeringsstip',
        html: `
          <span style="display:flex;align-items:center;gap:12px">
            <span style="display:block;width:10px;height:10px;border-radius:50%;background:#06b6d4;flex-shrink:0;margin-top:4px"></span>
            <span style="display:block">
              ${line('GOED', { font: 'Inter', weight: 700, size: '4rem', color: '#fff', ls: '.04em' })}
              ${line('VOORBEREID', { font: 'Inter', weight: 700, size: '4rem', color: '#06b6d4', ls: '.04em' })}
            </span>
          </span>
        `
      },
      {
        label: 'Verticale balk links',
        note: 'accentbalk',
        html: `
          <span style="display:flex;gap:14px">
            <span style="display:block;width:5px;background:#06b6d4;border-radius:2px;flex-shrink:0"></span>
            <span>
              ${line('GOED', { font: 'Inter', weight: 700, size: '4rem', color: '#fff', ls: '.04em' })}
              ${line('VOORBEREID', { font: 'Inter', weight: 700, size: '4rem', color: '#06b6d4', ls: '.04em' })}
            </span>
          </span>
        `
      },
      {
        label: 'Onderstreping tweede regel',
        note: 'border-bottom op VOORBEREID',
        html: `
          ${line('GOED', { font: 'Inter', weight: 700, size: '4rem', color: '#fff', ls: '.04em' })}
          <span style="display:inline-block;font-family:'Inter',sans-serif;font-weight:700;font-size:4rem;color:#06b6d4;letter-spacing:.04em;text-transform:uppercase;border-bottom:3px solid #06b6d4;line-height:1.05">VOORBEREID</span>
        `
      },
      {
        label: 'GOED in box (filled)',
        note: 'highlight op eerste woord',
        html: `
          <span style="display:inline-block;font-family:'Inter',sans-serif;font-weight:700;font-size:3.6rem;color:#161616;letter-spacing:.04em;text-transform:uppercase;background:#06b6d4;padding:0 10px 2px;line-height:1.1">GOED</span>
          ${line('VOORBEREID', { font: 'Inter', weight: 700, size: '3.6rem', color: '#fff', ls: '.04em' })}
        `
      },
      {
        label: 'VOORBEREID in box (filled)',
        note: 'highlight op tweede woord',
        html: `
          ${line('GOED', { font: 'Inter', weight: 700, size: '3.6rem', color: '#fff', ls: '.04em' })}
          <span style="display:inline-block;font-family:'Inter',sans-serif;font-weight:700;font-size:3.6rem;color:#161616;letter-spacing:.04em;text-transform:uppercase;background:#06b6d4;padding:0 10px 2px;line-height:1.1">VOORBEREID</span>
        `
      },
      {
        label: 'Outline + solid',
        note: 'GOED outline · VOORBEREID solid',
        html: `
          <span style="display:block;font-family:'Inter',sans-serif;font-weight:700;font-size:4rem;color:transparent;-webkit-text-stroke:2px #fff;letter-spacing:.04em;text-transform:uppercase;line-height:.95">GOED</span>
          ${line('VOORBEREID', { font: 'Inter', weight: 700, size: '4rem', color: '#06b6d4', ls: '.04em' })}
        `
      },
      {
        label: 'Solid + outline',
        note: 'GOED solid · VOORBEREID outline',
        html: `
          ${line('GOED', { font: 'Inter', weight: 700, size: '4rem', color: '#fff', ls: '.04em' })}
          <span style="display:block;font-family:'Inter',sans-serif;font-weight:700;font-size:4rem;color:transparent;-webkit-text-stroke:2px #06b6d4;letter-spacing:.04em;text-transform:uppercase;line-height:.95">VOORBEREID</span>
        `
      },
      {
        label: 'Gradient op VOORBEREID',
        note: 'clip gradient tweede regel',
        html: `
          ${line('GOED', { font: 'Inter', weight: 700, size: '4rem', color: '#fff', ls: '.04em' })}
          <span style="display:block;font-family:'Inter',sans-serif;font-weight:700;font-size:4rem;background:linear-gradient(90deg,#0ea5e9,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.04em;text-transform:uppercase;line-height:.95">VOORBEREID</span>
        `
      },
      {
        label: 'Subtitel erbij',
        note: '"oefenen met keuzes" als context',
        html: `
          ${line('GOED', { font: 'Inter', weight: 700, size: '3.8rem', color: '#fff', ls: '.04em' })}
          ${line('VOORBEREID', { font: 'Inter', weight: 700, size: '3.8rem', color: '#06b6d4', ls: '.04em' })}
          <span style="display:block;font-family:'Inter',sans-serif;font-weight:500;font-size:.9rem;color:rgba(255,255,255,.5);letter-spacing:.12em;text-transform:uppercase;margin-top:10px">oefenen met keuzes</span>
        `
      },
      {
        label: 'Subtitel boven de titel',
        note: 'label boven als context',
        html: `
          <span style="display:block;font-family:'Inter',sans-serif;font-weight:500;font-size:.85rem;color:rgba(255,255,255,.4);letter-spacing:.18em;text-transform:uppercase;margin-bottom:8px">noodscenario simulator</span>
          ${line('GOED', { font: 'Inter', weight: 700, size: '3.8rem', color: '#fff', ls: '.04em' })}
          ${line('VOORBEREID', { font: 'Inter', weight: 700, size: '3.8rem', color: '#06b6d4', ls: '.04em' })}
        `
      },
    ];

    const gE = document.getElementById('g-accents');
    accents.forEach(a => {
      gE.appendChild(tile({ bg: '#0d1b2a', label: a.label, note: a.note, html: a.html }));
    });
  </script>
</body>
</html>
