      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 700px;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;

      border-color: #3fb950;
      background: #0d2016;

    .card-header .icon { font-size: 1.4rem; }
    .card-header h2 { font-size: 1rem; font-weight: 600; }
    .card p { font-size: .82rem; color: #8b949e; line-height: 1.5; }
    .btn-row { display: flex; gap: 8px; margin-top: 4px; }
    button {
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .1s, transform .08s;
    }
    button:active { transform: scale(.97); }
    .btn-play {
      background: #1f6feb;
      color: #fff;

    .btn-select {
      background: #238636;
      color: #fff;

    .result {

      padding: 20px 28px;
      background: #0d2016;
      border: 1px solid #3fb950;
      border-radius: 12px;

      width: 100%;
